<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kedi Playground</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="masthead">
        <div class="brand">
          <h1>Kedi Playground</h1>
          <div class="status-line" aria-live="polite">
            <span class="status-dot"></span>
            <span id="status">Starting</span>
          </div>
        </div>
        <div class="masthead-tools">
          <span class="runtime-note">Browser inference, Kedi runtime</span>
          <button id="open-env" class="secondary" type="button">Environment</button>
        </div>
      </header>

      <section class="workspace">
        <div class="editor-pane">
          <div class="pane-heading">Program</div>
          <textarea id="source" spellcheck="false" aria-label="Kedi source"></textarea>
        </div>

        <aside class="run-pane">
          <div class="run-toolbar">
            <div class="actions">
              <button id="run" class="primary" type="button">Run Kedi</button>
              <button id="cancel" class="secondary" type="button" disabled>Cancel</button>
            </div>
            <span id="timing" class="metric">idle</span>
          </div>

          <section class="controls" aria-label="Run controls">
            <div class="control-tabs" role="tablist" aria-label="Playground settings">
              <button
                id="run-setup-tab"
                class="control-tab active"
                type="button"
                role="tab"
                aria-selected="true"
                aria-controls="run-settings-panel"
                data-control-tab="run"
              >
                Run setup
              </button>
              <button
                id="model-settings-tab"
                class="control-tab"
                type="button"
                role="tab"
                aria-selected="false"
                aria-controls="model-settings-panel"
                data-control-tab="model"
              >
                Model settings
              </button>
            </div>

            <div
              id="run-settings-panel"
              class="control-panel run-controls-panel"
              role="tabpanel"
              aria-labelledby="run-setup-tab"
            >
              <div class="mode-group">
                <span class="group-label">Execution</span>
                <div class="segmented">
                  <label>
                    <input type="radio" name="mode" value="local" checked />
                    <span>Local WebGPU</span>
                  </label>
                  <label>
                    <input type="radio" name="mode" value="byok" />
                    <span>BYOK</span>
                  </label>
                </div>
              </div>

              <div id="local-controls">
                <label class="field">
                  <span>Model</span>
                  <select id="model"></select>
                </label>
              </div>

              <div id="model-source-controls" class="source-controls">
                <div class="mode-group">
                  <span class="group-label">Source</span>
                  <div class="segmented compact">
                    <label data-source-option="cache">
                      <input type="radio" name="model-source" value="cache" checked />
                      <span>Browser cache</span>
                    </label>
                    <label data-source-option="file">
                      <input type="radio" name="model-source" value="file" />
                      <span>File</span>
                    </label>
                  </div>
                </div>
                <div class="source-actions">
                  <button id="download-local" class="secondary" type="button">
                    Cache model
                  </button>
                  <div id="file-picker" class="file-picker" hidden>
                    <input
                      id="model-file"
                      class="file-input"
                      type="file"
                      accept=".gguf"
                      aria-label="GGUF file"
                    />
                    <label for="model-file" class="file-button">Choose GGUF</label>
                    <span id="model-file-name" class="file-name" aria-live="polite"></span>
                  </div>
                </div>
              </div>

              <div id="byok-controls" hidden>
                <label class="field">
                  <span>Model</span>
                  <select id="byok-model"></select>
                </label>
                <label id="custom-model-field" class="field" hidden>
                  <span>Custom model</span>
                  <input id="custom-model" placeholder="provider/model-or-id" />
                </label>
              </div>
            </div>

            <div
              id="model-settings-panel"
              class="control-panel model-settings-panel"
              role="tabpanel"
              aria-labelledby="model-settings-tab"
              hidden
            >
              <div class="settings-grid">
                <label class="field">
                  <span>Temperature</span>
                  <input
                    id="setting-temperature"
                    type="number"
                    min="0"
                    max="1"
                    step="0.05"
                    inputmode="decimal"
                  />
                </label>
                <label class="field">
                  <span>Max tokens</span>
                  <input
                    id="setting-max-tokens"
                    type="number"
                    min="1"
                    max="512"
                    step="1"
                    inputmode="numeric"
                  />
                </label>
                <label class="field">
                  <span>Top P</span>
                  <input
                    id="setting-top-p"
                    type="number"
                    min="0.05"
                    max="1"
                    step="0.05"
                    inputmode="decimal"
                  />
                </label>
                <label class="field">
                  <span>Seed</span>
                  <input
                    id="setting-seed"
                    type="number"
                    min="0"
                    max="4294967295"
                    step="1"
                    inputmode="numeric"
                    placeholder="Random"
                  />
                </label>
              </div>
              <button id="reset-model-settings" class="secondary settings-reset" type="button">
                Reset
              </button>
            </div>
          </section>

          <div class="progress-row" aria-live="polite">
            <span id="progress" hidden></span>
          </div>

          <div class="result">
            <div class="pane-heading">Output</div>
            <pre id="output">Waiting for run.</pre>
            <div id="error" class="error" hidden></div>
          </div>
        </aside>
      </section>

      <dialog id="env-dialog">
        <div class="dialog-header">
          <h2>Environment</h2>
          <button id="close-env" type="button" aria-label="Close">Close</button>
        </div>
        <div class="dialog-body">
          <label class="field">
            <span>HF_TOKEN</span>
            <input type="password" autocomplete="off" data-env="HF_TOKEN" />
          </label>
          <label class="field">
            <span>OPENROUTER_API_KEY</span>
            <input type="password" autocomplete="off" data-env="OPENROUTER_API_KEY" />
          </label>
          <label class="field">
            <span>OPENAI_API_KEY</span>
            <input type="password" autocomplete="off" data-env="OPENAI_API_KEY" />
          </label>
          <label class="field">
            <span>ANTHROPIC_API_KEY</span>
            <input type="password" autocomplete="off" data-env="ANTHROPIC_API_KEY" />
          </label>
          <label class="field">
            <span>GROQ_API_KEY</span>
            <input type="password" autocomplete="off" data-env="GROQ_API_KEY" />
          </label>
          <label class="field">
            <span>LOGFIRE_TOKEN</span>
            <input type="password" autocomplete="off" data-env="LOGFIRE_TOKEN" />
          </label>
          <label class="toggle-field">
            <input type="checkbox" data-env="LOGFIRE_ENABLED" />
            <span>Enable Logfire</span>
          </label>
          <div class="custom-env">
            <div class="custom-env-heading">
              <span>Custom variables</span>
              <button id="add-env" type="button">Add variable</button>
            </div>
            <div id="custom-env-list"></div>
          </div>
        </div>
        <div class="dialog-actions">
          <button id="clear-env" type="button">Clear</button>
          <button id="save-env" class="primary" type="button">Save</button>
        </div>
      </dialog>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
